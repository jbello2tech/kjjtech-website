<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#333333"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.5"/>
  <!-- KJJ TECH text -->
  <text
    x="600"
    y="295"
    font-family="'Josefin Sans', Arial, sans-serif"
    font-size="96"
    font-weight="200"
    fill="white"
    text-anchor="middle"
    letter-spacing="28"
  >KJJ TECH</text>
  <!-- Tagline -->
  <text
    x="600"
    y="365"
    font-family="'Josefin Sans', Arial, sans-serif"
    font-size="22"
    font-weight="200"
    fill="#767676"
    text-anchor="middle"
    letter-spacing="8"
  >NETWORKING &amp; IT SUPPORT</text>
